# в–Ҳв–„в–ҲвҖғв–„в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–„вҖғ вҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җв–„вҖғв–Ҳв–Ҳв–„вҖғв–Ҳв–Җв–‘вҖғв–„в–Ҳ

# Set your personal hyprland configuration here
# See https://wiki.hyprland.org/Configuring for more information

# // в–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҲвҖғв–Ҳв–‘в–ҲвҖғв–Җв–Ҳв–Җ
# // в–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–‘в–Ҳв–‘


#  Uncomment to enable // change to a preferred value
# рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = br
    kb_variant = abnt2
    # follow_mouse = 1
    # sensitivity = 0
    # force_no_accel = 0
    # accel_profile = flat 
    # numlock_by_default = true

    # рҹ”— See https://wiki.hyprland.org/Configuring/Variables/#touchpad
    touchpad {
        natural_scroll = no
    }

}



# рҹ”— See https://wiki .hyprland.org/Configuring/Variables/#gestures
gestures {
#     workspace_swipe = true
#     workspace_swipe_fingers = 3
}

# for window shallow similar to devour
misc {
    # enable_swallow = true
    # swallow_regex = (foot|kitty|allacritty|Alacritty|ghostty|Ghostty|org.wezfurlong.wezterm)
}

# Don't show update on first launch
ecosystem {
  # no_update_news = true
}

# =========================================================
# Fechar a janela ativa (MainMod + Shift + Q)
# =========================================================
$d=[$wm|Close active window]
bindd = $mainMod SHIFT, q, $d close window, killactive

# =========================================================
# Mover o foco entre janelas nГЈo-agrupadas/soltas (Ctrl)
# =========================================================
$d=[$wm|Focus standard window]
bindd = CTRL, h, $d focus left, movefocus, l
bindd = CTRL, l, $d focus right, movefocus, r
bindd = CTRL, k, $d focus up, movefocus, u
bindd = CTRL, j, $d focus down, movefocus, d

# =========================================================
# Mover a janela fisicamente pela tela (Ctrl + Shift + Letra)
# =========================================================
$d=[$wm|Move window]
bindd = CTRL SHIFT, h, $d move window left, movewindow, l
bindd = CTRL SHIFT, l, $d move window right, movewindow, r
bindd = CTRL SHIFT, k, $d move window up, movewindow, u
bindd = CTRL SHIFT, j, $d move window down, movewindow, d

# =========================================================
# Mover o foco entre janelas agrupadas/abas (MainMod)
# =========================================================
$d=[$wm|Focus grouped window]

# ForГ§a a remoГ§ГЈo do Lock original (Super + L)
unbind = $mainMod, l
unbind = $mainMod, L
unbindl = $mainMod, l
unbindl = $mainMod, L

bindd = $mainMod, h, $d group prev, changegroupactive, b
bindd = $mainMod, l, $d group next, changegroupactive, f
bindd = $mainMod, k, $d group prev, changegroupactive, b
bindd = $mainMod, j, $d group next, changegroupactive, f

# =========================================================
# Agrupar / Desagrupar Inteligente (MainMod + Shift + Letra)
# =========================================================
$d=[$wm|Toggle group in direction]
bindd = $mainMod SHIFT, h, $d toggle group left, movewindoworgroup, l
bindd = $mainMod SHIFT, l, $d toggle group right, movewindoworgroup, r
bindd = $mainMod SHIFT, k, $d toggle group up, movewindoworgroup, u
bindd = $mainMod SHIFT, j, $d toggle group down, movewindoworgroup, d

# =========================================================
# Desagrupar / Tirar janela do grupo (MainMod + Alt + Letra)
# =========================================================
$d=[$wm|Move window out of group]
bindd = $mainMod SHIFT, h, $d move out left, movewindow, l
bindd = $mainMod SHIFT, l, $d move out right, movewindow, r
bindd = $mainMod SHIFT, k, $d move out up, movewindow, u
bindd = $mainMod SHIFT, j, $d move out down, movewindow, d

# =========================================================
# Bloquear a sessГЈo / Lock screen (MainMod + ESC)
# =========================================================
$d=[$wm|Lock screen]
bindd = $mainMod, ESCAPE, $d Lock screen, exec, hyprlock

# TODO Make a main rofi menu for these selectors
$rice=Theming and Wallpaper
$d=[$rice]
bindd = $mainMod Shift, B, $d wallbash mode selector , exec, pkill -x rofi || hyde-shell wallbashtoggle -m # launch wallbash mode select menu

# =========================================================
# Reiniciar a Waybar (MainMod + Shift + R)
# =========================================================
$d=[$wm|Restart Waybar]
unbind = $mainMod Shift, R
bindd = $mainMod SHIFT, R, $d restart waybar, exec, killall waybar;

# Sua regra padrГЈo
monitor=,preferred,auto,1.25
